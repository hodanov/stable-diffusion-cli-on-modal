##########
# This is the config file to set a base model, vae and some tools.
# Rename the file to `config.yml` before running the script.
# Execute `modal deploy ./app/setup.py` every time modify this file.
##########

##########
# You can use a diffusers model and VAE on hugging face.
version: "sdxl" # Only 'sdxl' is supported now.
model:
  name: stable-diffusion-xl
  url: https://huggingface.co/replace/with/your/sdxl/model.safetensors
##########
# vae:
#   Optional for SDXL; keep if you provide a custom VAE.
#   name: your-sdxl-vae
#   url: https://huggingface.co/replace/with/your/sdxl/vae.safetensors

##########
# Add LoRA if you want to use one. You can use a download url such as the below.
# ex)
# loras:
#   - name: hogehoge.safetensors
#     url: https://hogehoge/xxxx
#   - name: fugafuga.safetensors
#     url: https://fugafuga/xxxx

##########
# You can use Textual Inversion and ControlNet also. Usage is the same as `loras`.
# ex)
# textual_inversions:
#   - name: hogehoge
#     url: https://hogehoge/xxxx
#   - name: fugafuga
#     url: https://fugafuga/xxxx
# controlnets:
#   - name: your-controlnet
#     repo_id: replace/with/your/sdxl-capable-controlnet

##########
# Wan I2V model settings.
wan_i2v:
  model:
    name: wan-i2v-a14b
    # repo_id is used when safetensors_url is not set.
    # If omitted, Wan-AI/Wan2.2-I2V-A14B-Diffusers is used.
    repo_id: Wan-AI/Wan2.2-I2V-A14B-Diffusers
    # Optional: if provided, this is prioritized over repo_id weights.
    # safetensors_url: https://huggingface.co/user/repo/resolve/main/your.safetensors
