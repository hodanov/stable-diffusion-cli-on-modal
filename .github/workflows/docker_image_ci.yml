name: Docker image CI

on:
  push:
    paths:
      - app/Dockerfile
      - app/pyproject.toml
      - app/uv.lock
      - .github/workflows/docker_image_ci.yml

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build the Docker image
        run: |
          cd app
          docker build . -f Dockerfile
